    <div class="d-flex justify-content-between text-center p-4 bg-body-tertiary">
        <h1 class="h2 mb-0">Admin Dashboard</h1>
        <button id="logout-btn" class="btn btn-outline-danger btn-sm">Sign Out</button>
    </div>
    <div class="container-fluid p-4 pb-0">
        <div class="row">
            
            <div class="col-lg-4 col-md-5 mb-4" style="max-height: 90vh; overflow-y: auto;">
                <!-- FOOTER SETTINGS -->
                <div class="card p-4 shadow-sm mb-4">
                    <h3 class="mb-4">Footer Settings</h3>
                    <div class="mb-4">
                        <label for="year-input" class="form-label fw-bold">Edit Copyright Year:</label>
                        <div class="input-group">
                            <input type="text" id="year-input" class="form-control" placeholder="e.g. 2027">
                            <button id="save-draft" class="btn btn-secondary">Update Preview</button>
                        </div>
                        <div id="sync-status" class="form-text text-muted mt-2">Draft synced with live site.</div>
                    </div>
                    <div class="d-grid">
                        <button id="publish-live" class="btn btn-success">Publish to Live Site</button>
                    </div>
                </div>
                <!-- VIDEO SETTINGS -->
                <div class="card p-4 shadow-sm">
                    <h3 class="mb-4">Video Settings</h3>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Select Video to Edit:</label>
                        <select id="video-selector" class="form-select">
                            <option value="home_main">Homepage - Graduation Video</option>
                            <option value="teaching_robotics">Teaching - Curriculum Development</option>
                            <option value="teaching_ai">Teaching - Undergraduate Research</option>
                        </select>
                    </div>
                    <div class="input-group mb-3">
                        <input type="text" id="video-input" class="form-control" placeholder="YouTube URL">
                        <button id="save-video-draft" class="btn btn-secondary">Update Preview</button>
                    </div>
                    <div class="d-grid">
                        <button id="publish-video-live" class="btn btn-success">Publish to Live Site</button>
                    </div>
                </div>
                <!-- PAGE CREATOR 
                <div class="card p-4 mt-4 shadow-sm">
                    <h3 class="mb-4"><i class="bi bi-file-earmark-plus"></i> Page Creator</h3>

                    <div class="d-grid">

                    </div>
                </div>-->

                <!-- SECTION CREATOR -->
                <div class="card p-4 mt-4 shadow-sm">
                    <h3 class="mb-4"><i class="bi bi-plus-square-fill"></i>Add New Section</h3>
                    
                    <div class="mb-2">
                        <label class="form-label fw-bold">Where should this section appear?</label>
                        <select id="section-location" class="form-select">
                            <option value="index.html">Home Page</option>
                            <option value="cv.html">CV Page</option>
                            <option value="research.html">Research Page</option>
                            <option value="teaching.html">Teaching Page</option>
                            <option value="service.html">Service Page</option>
                            
                        </select>
                        <div class="form-text">Choose the main page where this new content will be added.</div>
                    </div>
                
                    <hr>
                
                    <div class="mb-2">
                        <label class="form-label fw-bold">Section Heading:</label>
                        <input type="text" id="section-title" class="form-control" placeholder="e.g., New Research Activities">
                    </div>
                
                    <div class="mb-2">
                        <label class="form-label fw-bold">Section Description (Text):</label>
                        <textarea id="section-body" class="form-control" rows="4" placeholder="Describe this section..."></textarea>
                    </div>
                
                    <hr>
                
                    <div class="row mb-2 rounded mx-0">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase">Add an Image (Optional):</label>
                            <input type="file" id="section-image" class="form-control form-control-sm" accept="image/*">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase">Add a "Learn More" Button?</label>
                            <select id="has-subpage-button" class="form-select form-select-sm">
                                <option value="false">No Button (Text only)</option>
                                <option value="true">Yes, Create a detailed subpage</option>
                            </select>
                        </div>
                    </div>
                
                    <div class="d-grid mt-4">
                        <button id="add-section-btn" class="btn btn-warning btn-lg shadow">
                            <i class="bi bi-cloud-arrow-up"></i> Add Section to Page
                        </button>
                        <small class="text-center text-muted mt-2">This will appear at the bottom of the selected page.</small>
                    </div>
                    <hr>
                    <div class="p-4 mt-2">
                        <h3 class="text-danger mb-4">Manage Sections</h3>
                        <div id="manage-sections-list" class="list-group">
                            <p class="text-muted">Loading sections...</p>
                        </div>
                    </div>

                </div>

            </div>
            
            <!-- LIVE PREVIEW WINDOW -->
            <div class="col-lg-8 col-md-7">
                <div class="card shadow-sm h-100 border-primary" style="min-height: 85vh;">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold"><i class="bi bi-eye"></i> Live Staging Preview</span>
                        <button class="btn btn-sm btn-light" onclick="document.getElementById('site-preview').contentWindow.location.reload();">
                            <i class="bi bi-arrow-clockwise"></i> Force Refresh
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <iframe id="site-preview" src="index.html" width="100%" height="100%" style="border: none; min-height: 80vh;"></iframe>
                    </div>
                </div>
            </div>
    
        </div>
    </div>
